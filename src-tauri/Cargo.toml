[package]
name = "curator"
version = "0.1.0"
edition = "2021"
description = "A dedicated, always-findable home for the handful of browser tabs you can't afford to lose. macOS only."
authors = ["Lachlan Collins <lachlan@lsjc.com.au>"]
license = "MIT"
repository = "https://github.com/Lockyc/curator"
readme = "../README.md"
keywords = ["tauri", "macos", "browser", "tabs", "webview"]
categories = ["gui"]
publish = false

[lib]
name = "curator_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["unstable"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
url = "2"
notify = "6"
dirs = "5"
