# Pin the toolchain so rustfmt/clippy behave identically for everyone and in any
# future CI — an unpinned `stable` drifts and re-wraps committed code. rustup
# auto-installs this on first cargo use. (Lives in src-tauri, where `just` runs cargo.)
#
# Keep in lockstep with config-core's pin (the canonical version) and the sibling
# warden app. config-core is a git dependency, so its pin does NOT reach this build —
# this file governs curator's toolchain. Bump config-core first, then match it here.
[toolchain]
channel = "1.96.0"
components = ["rustfmt", "clippy"]
