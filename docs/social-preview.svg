<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bgg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1726"/>
      <stop offset="1" stop-color="#0a0f1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.16" cy="0.18" r="0.65">
      <stop offset="0" stop-color="#1d4ed8" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="iconbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bgg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>
  <rect x="20" y="20" width="1240" height="600" rx="28" fill="none" stroke="#1c2740" stroke-width="2"/>

  <!-- app icon (inlined vector) -->
  <svg x="104" y="170" width="300" height="300" viewBox="0 0 1024 1024">
    <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#iconbg)"/>
    <rect x="470" y="232" width="404" height="560" rx="40" fill="#ffffff"/>
    <g fill="#c7d2e3">
      <rect x="520" y="300" width="240" height="34" rx="17"/>
      <rect x="520" y="378" width="304" height="22" rx="11"/>
      <rect x="520" y="430" width="304" height="22" rx="11"/>
      <rect x="520" y="482" width="220" height="22" rx="11"/>
    </g>
    <g>
      <rect x="150" y="232" width="270" height="104" rx="30" fill="#ffffff" opacity="0.5"/>
      <rect x="150" y="360" width="270" height="104" rx="30" fill="#ffffff"/>
      <rect x="150" y="488" width="270" height="104" rx="30" fill="#ffffff" opacity="0.5"/>
      <rect x="150" y="616" width="270" height="104" rx="30" fill="#ffffff" opacity="0.5"/>
    </g>
  </svg>

  <g font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
    <text x="470" y="278" font-size="108" font-weight="700" fill="#ffffff" letter-spacing="-2">curator</text>
    <text x="474" y="344" font-size="33" fill="#9fb3c8">An always-findable home for the browser tabs</text>
    <text x="474" y="388" font-size="33" fill="#9fb3c8">you can't afford to lose. macOS only.</text>

    <g font-size="26" font-weight="500">
      <g>
        <rect x="472" y="432" width="116" height="50" rx="25" fill="#16223a" stroke="#27344f"/>
        <text x="530" y="465" text-anchor="middle" fill="#7fa8ff">macOS</text>
      </g>
      <g>
        <rect x="604" y="432" width="150" height="50" rx="25" fill="#16223a" stroke="#27344f"/>
        <text x="679" y="465" text-anchor="middle" fill="#7fa8ff">Tauri v2</text>
      </g>
      <g>
        <rect x="770" y="432" width="100" height="50" rx="25" fill="#16223a" stroke="#27344f"/>
        <text x="820" y="465" text-anchor="middle" fill="#7fa8ff">Rust</text>
      </g>
      <g>
        <rect x="886" y="432" width="214" height="50" rx="25" fill="#16223a" stroke="#27344f"/>
        <text x="993" y="465" text-anchor="middle" fill="#7fa8ff">multi-window</text>
      </g>
    </g>
  </g>
</svg>
