name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    # macOS: curator is a tauri app embedding a webview and the shared cores, so the
    # workspace compiles on macOS by design. The toolchain comes from rust-toolchain.toml
    # (the runner's rustup installs the pinned channel + components on first cargo call).
    # A fresh single-repo checkout has the [patch] overrides off, so cargo resolves the
    # cores from git — the same shape `just gate` guards locally.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Tests
        run: cargo test --workspace

      # The demo config must stay in the house format — same check `just gate` runs.
      - name: Example config is formatted
        run: cargo run -p curator -- fmt --check examples/config.toml
