<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body { margin: 0; height: 100%; background: #1e1e1e; color: #e0e0e0;
        font: 14px/1.55 -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        -webkit-user-select: text; }
      body { display: flex; flex-direction: column; align-items: center;
        justify-content: center; padding: 0 48px; box-sizing: border-box; text-align: center; }
      h1 { font-size: 16px; font-weight: 600; color: #f2f2f2; margin: 0 0 14px; }
      pre { max-width: 680px; white-space: pre-wrap; word-break: break-word; color: #ff8a8a;
        background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px;
        padding: 14px 18px; margin: 0 0 20px; text-align: left; }
      p { color: #9a9a9a; margin: 0; max-width: 560px; }
      code { color: #cfcfcf; background: #2a2a2a; padding: 1px 6px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>curator couldn't load your config</h1>
    <pre id="msg"></pre>
    <p>Fix it from <code>Config ▸ Edit Config</code> and save — curator reloads automatically.</p>
    <script>
      document.getElementById("msg").textContent =
        window.__CURATOR_ERROR__ || "No [[window]] blocks defined in the config.";
    </script>
  </body>
</html>
