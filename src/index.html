<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>curator</title>
    <link rel="stylesheet" href="chrome.css" />
  </head>
  <body>
    <div id="error-banner" hidden></div>
    <div id="identity" hidden></div>
    <div id="navbar">
      <div class="nav-pill">
        <button id="nav-back" class="nav-btn" title="Back" disabled></button>
        <button id="nav-forward" class="nav-btn" title="Forward" disabled></button>
        <button id="nav-reload" class="nav-btn" title="Reload" disabled></button>
        <button id="nav-home" class="nav-btn" title="Go to start" disabled></button>
      </div>
    </div>
    <nav id="sidebar"></nav>
    <div id="add-tab">
      <button id="add-tab-toggle" type="button">+ Add tab</button>
      <form id="add-tab-form" hidden>
        <div id="add-tab-error" hidden></div>
        <input id="at-title" type="text" placeholder="Title" autocomplete="off" />
        <input id="at-url" type="text" placeholder="https://…" autocomplete="off" />
        <select id="at-group"></select>
        <details id="at-advanced">
          <summary>Advanced</summary>
          <label><input id="at-load" type="checkbox" /> Load on open</label>
          <input id="at-reload" type="number" min="1" placeholder="Reload every (min)" />
          <input id="at-session" type="text" placeholder="Session (blank = inherit)" autocomplete="off" />
        </details>
        <div class="add-tab-actions">
          <button id="at-save" type="submit">Add</button>
          <button id="at-cancel" type="button">Cancel</button>
        </div>
      </form>
    </div>
    <div id="resize-handle" title="Drag to resize · double-click to reset"></div>
    <script type="module" src="chrome.js"></script>
  </body>
</html>
