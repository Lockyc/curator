# Example curator config. Copy to ~/.config/curator/config.toml and edit.
# Order of groups and tabs is the render order. Required per tab: title, url.
#
# curator opens one window per [[window]] block.
#
# Loading & notifications: a tab marked `always_load` is loaded at launch and kept live, so it
# keeps syncing and can fire native banners / report unread in the background. Tabs without it
# are lazy (loaded on first click) and don't notify in the background until you open them. There
# is no per-window switch — `always_load` is the only knob.
#
# Logins: by default every tab shares one app-wide store, so signing into a provider covers
# its related services (Gmail + Calendar share your Google login). To give a tab its own
# account, set `session = "name"` on the tab; reuse the same name on other tabs (in any
# window) to share that login. A window-level `session` is the default for its tabs. Resolution
# is tab.session → window.session → shared default. Logins follow the session name, so renaming
# a window or editing a URL never signs you out.
#
# `just dev` loads this file (via CURATOR_CONFIG) so you can try it without touching
# your real ~/.config/curator/config.toml.

# Force dark appearance (sites honouring prefers-color-scheme render dark). Omit = follow system.
# dark_mode = true

# Accept self-signed/invalid TLS certs for these hosts only (e.g. homelab devices).
# Applied at launch — restart to change.
# allow_insecure = ["192.168.1.1"]

# ─── Window 1: Keepers ────────────────────────────────────────────────────────
# Dashboards and docs. Tabs are lazy by default (loaded on first click); none are kept live,
# so this window stays quiet.

[[window]]
title           = "Keepers"
colour          = "#0f8a8a"   # optional accent: name banner + faint navbar tint (per-window identity)
open_on_launch  = "Grafana"   # open this tab on launch instead of the blank screen

  [[window.group]]
  name = "Dashboards"

    [[window.group.tab]]
    title        = "Grafana"
    url          = "https://play.grafana.org/"
    always_load  = true   # preload + keep warm from launch (default false)
    reload_every = 5      # auto-refresh every 5 minutes

    [[window.group.tab]]
    title = "Uptime Kuma"
    url   = "https://demo.uptime.kuma.pet/"

  [[window.group]]
  name = "Status"

    [[window.group.tab]]
    title = "GitHub Status"
    url   = "https://www.githubstatus.com/"

    [[window.group.tab]]
    title = "Cloudflare Status"
    url   = "https://www.cloudflarestatus.com/"

  [[window.group]]
  name = "Docs"

    [[window.group.tab]]
    title = "Material for MkDocs"
    url   = "https://squidfunk.github.io/mkdocs-material/"

    [[window.group.tab]]
    title = "Tauri"
    url   = "https://tauri.app/"

# ─── Window 2: Comms ──────────────────────────────────────────────────────────
# Chat apps you want live: each is `always_load`, so it stays loaded in the background, fires
# native banners on new messages, and rolls its unread count up to the dock badge.

[[window]]
title = "Comms"

  [[window.group]]
  name = "Chat"

    [[window.group.tab]]
    title       = "Mattermost"
    url         = "https://community.mattermost.com/"
    always_load = true   # keep live so it notifies even when it isn't the active tab

    [[window.group.tab]]
    title       = "Slack"
    url         = "https://app.slack.com/"
    always_load = true
    # session = "work"   # give this tab its own login store (e.g. a separate account)

  [[window.group]]
  name = "Notifications"

    [[window.group.tab]]
    # ntfy.sh is an open-source push-notification service. Replace with your self-hosted
    # instance URL (e.g. https://ntfy.example.com/) — the tab renders the ntfy web UI.
    title       = "ntfy"
    url         = "https://ntfy.sh/app"
    always_load = true
